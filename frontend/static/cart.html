<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyMart Haute - Bag Curation Room</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
      /* ELEGANT GLASSMORPHISM DESIGN SYSTEM */
      @import url("https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Plus Jakarta Sans", sans-serif;
      }

      body {
        margin: 0;
        padding: 0;
        color: #f5f5f4;
        min-height: 100vh;
        background: radial-gradient(
          circle at center,
          #2c2421 0%,
          #120e0d 70%,
          #050403 100%
        );
        background-attachment: fixed;
        display: flex;
        flex-direction: column;
      }

      .backdrop-overlay {
        position: fixed;
        inset: 0;
        background-image: radial-gradient(
            rgba(217, 119, 6, 0.05) 1px,
            transparent 0
          ),
          radial-gradient(rgba(217, 119, 6, 0.03) 2px, transparent 0);
        background-size:
          24px 24px,
          48px 48px;
        pointer-events: none;
        z-index: 1;
      }

      /* NAVIGATION BAR MATCHING PREMIUM THEME */
      .navbar {
        position: sticky;
        top: 0;
        background: rgba(18, 14, 13, 0.75);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        padding: 24px 50px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 1000;
      }

      .logo {
        font-family: "Cinzel", serif;
        font-size: 24px;
        font-weight: 700;
        color: #faf9f5;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 3px;
        text-decoration: none;
      }

      .back-to-archive-trigger {
        font-size: 11px;
        font-weight: 600;
        color: #a8a29e;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 10px 20px;
        background: transparent;
        transition: all 0.3s;
      }
      .back-to-archive-trigger:hover {
        color: #faf9f5;
        border-color: #faf9f5;
      }

      /* MASTER GLASS WRAPPER */
      .glass-container {
        flex-grow: 1;
        width: 90%;
        max-width: 1200px;
        margin: 50px auto 100px auto;
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 4px;
        padding: 50px;
        position: relative;
        z-index: 10;
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
      }

      .bag-header {
        margin-bottom: 40px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        padding-bottom: 24px;
      }
      .bag-header h1 {
        font-family: "Cinzel", serif;
        font-size: 32px;
        font-weight: 400;
        color: #faf9f5;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      .editorial-split-layout {
        display: grid;
        grid-template-columns: 1.6fr 1fr;
        gap: 60px;
      }

      /* ITEM ENTRIES */
      .curation-items-stack {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .empty-curation-indicator {
        padding: 60px 0;
        color: #a8a29e;
        text-align: center;
        font-size: 15px;
      }

      .item-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(255, 255, 255, 0.01);
        border: 1px solid rgba(255, 255, 255, 0.05);
        padding: 24px;
        border-radius: 2px;
        gap: 24px;
        transition: border-color 0.3s;
      }
      .item-card:hover {
        border-color: rgba(255, 255, 255, 0.15);
      }

      .item-media {
        width: 90px;
        height: 110px;
        background: rgba(255, 255, 255, 0.02);
        padding: 10px;
        flex-shrink: 0;
      }
      .item-media img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .item-brand {
        font-size: 9px;
        color: #d97706;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .item-name {
        font-size: 15px;
        font-weight: 500;
        color: #faf9f5;
        margin-bottom: 12px;
      }
      .item-price {
        font-size: 16px;
        font-weight: 600;
        color: #faf9f5;
      }

      .remove-node-trigger {
        background: transparent;
        color: #ef4444;
        border: none;
        cursor: pointer;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-weight: 600;
        transition: opacity 0.2s;
      }
      .remove-node-trigger:hover {
        opacity: 0.7;
      }

      /* COMPOSURE ORDER DOCK */
      .financial-summary-panel {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.06);
        padding: 40px;
        border-radius: 2px;
        height: fit-content;
      }

      .summary-headline {
        font-family: "Cinzel", serif;
        font-size: 18px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 30px;
        color: #faf9f5;
      }

      .summary-meta-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
        font-size: 13px;
        color: #a8a29e;
      }

      .summary-meta-row.grand-total {
        margin-top: 30px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding-top: 24px;
        font-size: 18px;
        color: #faf9f5;
        font-weight: 600;
      }

      .checkout-composure-trigger {
        width: 100%;
        padding: 16px;
        background: #faf9f5;
        color: #120e0d;
        border: none;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        cursor: pointer;
        transition: opacity 0.2s;
        margin-top: 10px;
      }
      .checkout-composure-trigger:hover {
        opacity: 0.9;
      }

      /* DESTINATION FORM */
      .destination-profile-scope {
        display: none;
        margin-top: 40px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding-top: 40px;
      }
      .destination-group {
        margin-bottom: 24px;
      }
      .destination-group label {
        display: block;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #faf9f5;
        margin-bottom: 10px;
      }
      .destination-group input,
      .destination-group textarea {
        width: 100%;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 12px 18px;
        color: #faf9f5;
        font-size: 14px;
        outline: none;
      }
      .destination-group input:focus,
      .destination-group textarea:focus {
        border-color: rgba(255, 255, 255, 0.3);
      }
      .destination-group textarea {
        height: 80px;
        resize: none;
      }
    </style>
  </head>

  <body>
    <div class="backdrop-overlay"></div>

    <div class="navbar">
      <a href="product.html" class="logo">SkyMart</a>
      <button
        onclick="window.location.replace('product.html')"
        class="back-to-archive-trigger"
      >
        Back to Gallery
      </button>
    </div>

    <div class="glass-container">
      <div class="bag-header">
        <h1>Selected Curation</h1>
      </div>

      <div class="editorial-split-layout">
        <!-- LEFT LIST -->
        <div id="curationListScope" class="curation-items-stack"></div>

        <!-- RIGHT TOTALS -->
        <div class="financial-summary-panel">
          <div class="summary-headline">Price Summary</div>

          <div class="summary-meta-row">
            <span>Archive Index Total</span>
            <span id="priceIndexVal">₹0</span>
          </div>
          <div class="summary-meta-row">
            <span>Complementary Shipping</span>
            <span style="color: #10b981">FREE</span>
          </div>

          <div class="summary-meta-row grand-total">
            <span>Fulfillment Total</span>
            <span id="totalFulfillVal">₹0</span>
          </div>

          <button
            onclick="expandDestinationInterface()"
            class="checkout-composure-trigger"
          >
            Fulfillment Processing
          </button>

          <!-- NESTABLE CHECKOUT SUBFORM -->
          <div id="checkoutSubformField" class="destination-profile-scope">
            <h3
              class="summary-headline"
              style="font-size: 14px; margin-bottom: 24px"
            >
              Fulfillment Target
            </h3>

            <div class="destination-group">
              <label>Full Receiver Name</label>
              <input
                type="text"
                id="recvName"
                placeholder="Sterling Hunt"
                required
              />
            </div>
            <div class="destination-group">
              <label>Contact Number</label>
              <input
                type="tel"
                id="recvPhone"
                placeholder="+91 XXXXXXXXXX"
                required
              />
            </div>
            <div class="destination-group">
              <label>Mailing Coordinates</label>
              <textarea
                id="recvAddress"
                placeholder="Street vector representation models..."
              ></textarea>
            </div>
            <div class="destination-group">
              <label>Zone PIN</label>
              <input type="text" id="recvPin" placeholder="560001" />
            </div>

            <button
              onclick="triggerRzpGatewayCheckout()"
              style="background: #10b981; color: white"
              class="checkout-composure-trigger"
            >
              Execute Secure Payment
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      let localCart = JSON.parse(localStorage.getItem("cart")) || [];
      let productsArchived =
        JSON.parse(localStorage.getItem("products_db")) || [];

      function renderBagView() {
        const workspace = document.getElementById("curationListScope");
        if (localCart.length === 0) {
          workspace.innerHTML = `<div class="empty-curation-indicator">Your current selection chamber is vacant.</div>`;
          document.getElementById("priceIndexVal").innerText = "₹0";
          document.getElementById("totalFulfillVal").innerText = "₹0";
          return;
        }

        let dynamicHTML = "";
        let finalTally = 0;

        localCart.forEach((pid, uiIdx) => {
          const matchingObject = productsArchived.find((p) => p.id === pid);
          if (matchingObject) {
            finalTally += matchingObject.price;
            dynamicHTML += `
            <div class="item-card">
              <div style="display:flex; align-items:center; gap:24px;">
                <div class="item-media">
                  <img src="${matchingObject.img}" alt="${matchingObject.name}">
                </div>
                <div>
                  <div class="item-brand">${matchingObject.brand}</div>
                  <div class="item-name">${matchingObject.name}</div>
                  <div class="item-price">₹${matchingObject.price}</div>
                </div>
              </div>
              <button onclick="removeItemFromActiveStack(${uiIdx})" class="remove-node-trigger">Remove</button>
            </div>`;
          }
        });

        workspace.innerHTML = dynamicHTML;
        document.getElementById("priceIndexVal").innerText = `₹${finalTally}`;
        document.getElementById("totalFulfillVal").innerText = `₹${finalTally}`;
      }

      function removeItemFromActiveStack(arrayPosition) {
        localCart.splice(arrayPosition, 1);
        localStorage.setItem("cart", JSON.stringify(localCart));
        renderBagView();
      }

      function expandDestinationInterface() {
        const logged = localStorage.getItem("isLoggedIn") === "true";
        if (!logged) {
          alert("Authorization entry token invalid. Please log in.");
          window.location.href = "login.html";
          return;
        }
        if (localCart.length === 0) {
          alert("Cannot process a vacant container selection state.");
          return;
        }
        document.getElementById("checkoutSubformField").style.display = "block";
      }

      function calculateTotalInt() {
        let finalTally = 0;
        localCart.forEach((pid) => {
          const targetItem = productsArchived.find((p) => p.id === pid);
          if (targetItem) finalTally += targetItem.price;
        });
        return finalTally;
      }

      function triggerRzpGatewayCheckout() {
        const name = document.getElementById("recvName").value.trim();
        const contact = document.getElementById("recvPhone").value.trim();
        const address = document.getElementById("recvAddress").value.trim();
        const pin = document.getElementById("recvPin").value.trim();

        if (!name || !contact || !address || !pin) {
          alert("Standard checkout validation error: Empty route data.");
          return;
        }

        const totalCost = calculateTotalInt();

        const gatewayOptionsModel = {
          key: "rzp_test_YOUR_KEY_HERE",
          amount: totalCost * 100,
          currency: "INR",
          name: "SkyMart",
          description: "Archive Secure Catalog Transaction Processing",
          handler: function (response) {
            alert(
              `Secure Payment Confirmed.\nTrace Reference: ${response.razorpay_payment_id}`,
            );
            localCart = [];
            localStorage.setItem("cart", "[]");
            window.location.replace("product.html");
          },
          prefill: {
            name: name,
            contact: contact,
          },
          theme: {
            color: "#120E0D",
          },
        };

        try {
          const activeRzpProcessor = new Razorpay(gatewayOptionsModel);
          activeRzpProcessor.open();
        } catch (error) {
          alert(
            `Failsafe Standard Verification:\nInvoice: ₹${totalCost}\nFulfillment Route Registered:\n${name}\n${address}, PIN: ${pin}\n\nTransaction processed.`,
          );
          localCart = [];
          localStorage.setItem("cart", "[]");
          window.location.replace("product.html");
        }
      }

      window.onload = renderBagView;
    </script>
  </body>
</html>
