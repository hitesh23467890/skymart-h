<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyMart - Change Account Password</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            position: relative;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3a8a 0%, #0d1b2a 100%);
            overflow: hidden;
            padding: 20px;
        }

        /* Ambient glowing background decoration */
        .glassy-glow-radial {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.25;
            z-index: 1;
        }
        .glow-blue {
            width: 380px;
            height: 380px;
            background: #2563eb;
            top: -10%;
            left: -10%;
        }
        .glow-amber {
            width: 320px;
            height: 320px;
            background: #d97706;
            bottom: -5%;
            right: -5%;
        }

        .reset-password-layout-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 440px;
            border-radius: 20px;
            padding: 40px;
            z-index: 10;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            color: white;
            text-align: center;
        }

        .logo-display {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1.5px;
            margin-bottom: 24px;
            color: #ffffff;
        }
        .logo-display span {
            color: #fbbf24;
        }

        p.pass-tagline-text {
            font-size: 14px;
            color: #bfdbfe;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .form-interactive-group {
            text-align: left;
            margin-bottom: 24px;
        }
        .form-interactive-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #93c5fd;
        }
        .form-interactive-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 14px;
            border-radius: 10px;
            color: white;
            outline: none;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-interactive-group input:focus {
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .submit-trigger-button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 24px;
        }
        .submit-trigger-button:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .support-info-text {
            font-size: 12px;
            color: #93c5fd;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="glassy-glow-radial glow-blue"></div>
    <div class="glassy-glow-radial glow-amber"></div>

    <div class="reset-password-layout-card">
        <div class="logo-display">Sky<span>Mart</span></div>
        
        <h2>Configure Password</h2>
        <p class="pass-tagline-text font-serif">Enter your brand-new secure access credentials below.</p>

        <div class="form-interactive-group">
            <label>New Secret Code</label>
            <input type="password" id="newSecCode" placeholder="At least 6 characters" required>
        </div>

        <div class="form-interactive-group">
            <label>Verify Secret Code</label>
            <input type="password" id="newSecCodeConfirm" placeholder="Re-enter verification code" required>
        </div>

        <button onclick="commitNewSecret()" class="submit-trigger-button">Apply Credentials</button>

        <div class="support-info-text">Updates will immediately cascade into the cloud database router.</div>
    </div>

    <script>
        function commitNewSecret() {
            const pass = document.getElementById("newSecCode").value.trim();
            const passConf = document.getElementById("newSecCodeConfirm").value.trim();

            if (pass === "" || passConf === "") {
                alert("Please fill out both parameters.");
                return;
            }

            if (pass !== passConf) {
                alert("The credentials represent distinct inputs. Confirm matches.");
                return;
            }

            if (pass.length < 6) {
                alert("The password profile is too fragile; minimum character length is 6.");
                return;
            }

            alert("Successfully applied fresh credentials! Sign in with your new secret code.");
            setTimeout(() => {
                window.location.href = "login.html";
            }, 1000);
        }
    </script>
</body>
</html>
