<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyMart - Sign In</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(
          135deg,
          #eff6ff 0%,
          #ffffff 50%,
          #fef3c7 100%
        );
        overflow: hidden;
        padding: 20px;
      }

      .circle {
        position: absolute;
        border-radius: 50%;
        opacity: 0.15;
        z-index: 0;
      }

      .c1 {
        width: 350px;
        height: 350px;
        background: #3b82f6;
        top: -100px;
        left: -100px;
      }
      .c2 {
        width: 250px;
        height: 250px;
        background: #f59e0b;
        bottom: -80px;
        right: -80px;
      }
      .c3 {
        width: 180px;
        height: 180px;
        background: #10b981;
        top: 40%;
        right: 8%;
      }

      .container {
        width: 100%;
        max-width: 1200px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 60px;
        position: relative;
        z-index: 1;
      }

      .hero {
        flex: 1;
        text-align: center;
      }

      .hero-main {
        width: 280px;
        animation: float 4s ease-in-out infinite;
      }

      .hero h1 {
        margin-top: 20px;
        font-size: 60px;
        color: #2563eb;
      }

      .hero p {
        margin-top: 12px;
        color: #555;
        font-size: 18px;
        line-height: 1.6;
      }

      .product-icons {
        margin-top: 30px;
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .product-icons img {
        width: 70px;
        height: 70px;
        transition: 0.3s;
      }

      .product-icons img:hover {
        transform: translateY(-10px) scale(1.1);
      }

      .card {
        width: 420px;
        background: white;
        border-radius: 20px;
        padding: 35px;
        box-shadow: 0 15px 50px rgba(0, 0, 0, 0.1);
      }

      .card h2 {
        color: #111827;
        margin-bottom: 25px;
        font-size: 30px;
      }

      .field {
        margin-bottom: 18px;
      }

      .field label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #374151;
      }

      .field input {
        width: 100%;
        padding: 13px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        outline: none;
        transition: 0.3s;
      }

      .field input:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      }

      .forgot {
        display: block;
        text-align: right;
        margin-top: 8px;
        font-size: 13px;
        color: #2563eb;
        text-decoration: none;
      }

      .forgot:hover {
        text-decoration: underline;
      }

      .remember {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
        color: #555;
        font-size: 14px;
      }

      .btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        background: #3b82f6;
        color: white;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 20px;
        transition: 0.3s;
      }

      .btn:hover {
        background: #2563eb;
        transform: translateY(-2px);
      }

      .footer {
        margin-top: 20px;
        text-align: center;
        font-size: 12px;
        color: #777;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-15px);
        }
      }

      .toast {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 15px 20px;
        border-radius: 10px;
        color: white;
        font-size: 14px;
        font-weight: 500;
        opacity: 0;
        transform: translateX(100px);
        transition: 0.4s ease;
        z-index: 9999;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .toast.show {
        opacity: 1;
        transform: translateX(0);
      }

      .toast.success {
        background: #10b981;
      }
      .toast.error {
        background: #ef4444;
      }

      @media (max-width: 900px) {
        .container {
          flex-direction: column;
        }
        .hero h1 {
          font-size: 45px;
        }
        .hero-main {
          width: 200px;
        }
        .card {
          width: 100%;
          max-width: 420px;
        }
      }
    </style>
  </head>

  <body>
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>

    <div id="toast" class="toast"></div>

    <div class="container">
      <!-- LEFT SIDE -->
      <div class="hero">
        <img
          class="hero-main"
          src="https://cdn-icons-png.flaticon.com/512/3144/3144456.png"
          alt="Shopping Cart"
        />

        <h1>SkyMart</h1>

        <p>
          Everything you need, delivered smarter.<br />
          Shop groceries, fashion, electronics and more with fast & secure
          delivery.
        </p>

        <div class="product-icons">
          <img src="https://cdn-icons-png.flaticon.com/512/892/892458.png" />
          <img src="https://cdn-icons-png.flaticon.com/512/2589/2589874.png" />
          <img src="https://cdn-icons-png.flaticon.com/512/3081/3081986.png" />
          <img src="https://cdn-icons-png.flaticon.com/512/869/869636.png" />
          <img src="https://cdn-icons-png.flaticon.com/512/1046/1046857.png" />
        </div>
      </div>

      <!-- LOGIN CARD -->
      <div class="card">
        <h2>Sign In to SkyMart</h2>

        <div class="field">
          <label>Email or Mobile Number</label>
          <input
            type="text"
            id="email"
            placeholder="Enter email or mobile number"
          />
        </div>

        <div class="field">
          <label>Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
          />

          <a href="forgot.html" class="forgot">Forgot Password?</a>
        </div>

        <label class="remember">
          <input type="checkbox" />
          Keep me signed in
        </label>

        <button class="btn" onclick="login()">Sign In</button>

        <div class="footer">© 2026 SkyMart. All Rights Reserved.</div>
      </div>
    </div>

    <script>
      function showToast(message, type) {
        const toast = document.getElementById("toast");

        toast.className = "toast " + type;
        toast.innerText = message;
        toast.classList.add("show");

        setTimeout(() => {
          toast.classList.remove("show");
        }, 3000);
      }

      function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        if (email === "" || password === "") {
          showToast("Please fill all fields", "error");
          return;
        }

        if (password.length < 6) {
          showToast("Password must be at least 6 characters", "error");
          return;
        }

        showToast("Login successful 🎉", "success");

        setTimeout(() => {
          window.location.href = "product.html";
        }, 1500);
      }
    </script>
  </body>
</html>
