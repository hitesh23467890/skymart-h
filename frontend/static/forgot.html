<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyMart - Retrieve Account Password</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            position: relative;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3a8a 0%, #0d1b2a 100%);
            overflow: hidden;
            padding: 20px;
        }

        /* Ambient glowing background decoration */
        .glassy-glow-radial {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.25;
            z-index: 1;
        }
        .glow-blue {
            width: 380px;
            height: 380px;
            background: #2563eb;
            top: -10%;
            left: -10%;
        }
        .glow-amber {
            width: 320px;
            height: 320px;
            background: #d97706;
            bottom: -5%;
            right: -5%;
        }

        .forgot-password-layout-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 440px;
            border-radius: 20px;
            padding: 40px;
            z-index: 10;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            color: white;
            text-align: center;
        }

        .back-nav-anchor {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #93c5fd;
            text-decoration: none;
            font-size: 13px;
            align-self: flex-start;
            margin-bottom: 30px;
            font-weight: 500;
        }
        .back-nav-anchor:hover {
            color: #ffffff;
        }

        .logo-display {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1.5px;
            margin-bottom: 24px;
            color: #ffffff;
        }
        .logo-display span {
            color: #fbbf24;
        }

        p.forgot-tagline-text {
            font-size: 14px;
            color: #bfdbfe;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .form-interactive-group {
            text-align: left;
            margin-bottom: 24px;
        }
        .form-interactive-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #93c5fd;
        }
        .form-interactive-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 14px;
            border-radius: 10px;
            color: white;
            outline: none;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-interactive-group input:focus {
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .submit-trigger-button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 24px;
        }
        .submit-trigger-button:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .support-info-text {
            font-size: 12px;
            color: #93c5fd;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="glassy-glow-radial glow-blue"></div>
    <div class="glassy-glow-radial glow-amber"></div>

    <div class="forgot-password-layout-card">
        <div style="text-align: left;">
            <a href="login.html" class="back-nav-anchor">← Sign In page</a>
        </div>

        <div class="logo-display">Sky<span>Mart</span></div>
        
        <h2>Password Retrieval</h2>
        <p class="forgot-tagline-text">Provide the verified account email parameters to configure a credential change session.</p>

        <div class="form-interactive-group">
            <label>Registered Email</label>
            <input type="email" id="forgotTargetMail" placeholder="sterling@gmail.com" required>
        </div>

        <button onclick="requestPassAction()" class="submit-trigger-button">Verify Email Access</button>

        <div class="support-info-text">Secure parameters handled under SkyMart terms.</div>
    </div>

    <script>
        function requestPassAction() {
            const userIn = document.getElementById("forgotTargetMail").value.trim();
            if (userIn === "") {
                alert("Please declare a target retrieval mail.");
                return;
            }
            alert(`Instruction Verification Link dispatched:\n${userIn}`);
            setTimeout(() => {
                window.location.href = "reset-password.html";
            }, 1000);
        }
    </script>
</body>
</html>
